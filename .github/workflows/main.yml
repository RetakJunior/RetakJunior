name: Generate Datas

on:
  schedule: # Her 12 saatte bir otomatik çalışır
    - cron: "0 */12 * * *"
  workflow_dispatch: # İstediğin zaman manuel de çalıştırabilirsin

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    steps:
      # Snake Animation oluşturucu
      - name: generate-github-contribution-grid-snake
        uses: Platane/snk@v3
        with:
          github_user_name: RetakJunior
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#a32cc4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Oluşan siyah animasyonu output branch'ine yükle
      - name: push github-contribution-grid-snake to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
